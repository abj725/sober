<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SoberTrack">
  <meta name="description" content="Disulfiram accountability with Video Observed Therapy, GPS alerts, and streak tracking">

  <title>SoberTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ── Onboarding ────────────────────────────────────────────────────────── -->
<div id="onboarding" class="onboarding-screen" style="display:none">
  <div id="ob-dots" class="step-dots"></div>
  <div id="ob-content" class="onboarding-content"></div>
  <div class="onboarding-actions">
    <button class="btn btn-primary btn-lg" onclick="Onboarding.next()" id="ob-next">Continue</button>
    <button class="btn btn-ghost" onclick="Onboarding.back()" id="ob-back" style="display:none">Back</button>
  </div>
</div>

<!-- ── Main app shell ────────────────────────────────────────────────────── -->
<div id="app-shell" class="app-shell" style="display:none">

  <!-- Home screen -->
  <div id="screen-home" class="screen active">
    <div id="home-content"></div>
  </div>

  <!-- Check-in screen -->
  <div id="screen-checkin" class="screen">
    <div id="checkin-content"></div>
  </div>

  <!-- Partner / GPS screen -->
  <div id="screen-partner" class="screen">
    <div id="partner-content"></div>
  </div>

  <!-- Progress screen -->
  <div id="screen-progress" class="screen">
    <div id="progress-content"></div>
  </div>

  <!-- Settings screen -->
  <div id="screen-settings" class="screen">
    <div id="settings-content"></div>
  </div>

  <!-- Bottom navigation -->
  <nav class="nav-bar">
    <button class="nav-item active" data-tab="home">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-tab="checkin">
      <span class="nav-icon">💊</span>
      <span>Check-in</span>
    </button>
    <button class="nav-item" data-tab="partner">
      <span class="nav-icon">📍</span>
      <span>GPS</span>
    </button>
    <button class="nav-item" data-tab="progress">
      <span class="nav-icon">📊</span>
      <span>Progress</span>
    </button>
    <button class="nav-item" data-tab="settings">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </nav>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<!-- Scripts -->
<script src="js/db.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
</body>
</html>
